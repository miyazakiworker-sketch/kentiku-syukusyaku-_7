<!DOCTYPE html>
<html lang="ja" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場の相棒！CAD縮尺・寸法一瞬変換ツール</title>
    <style>
        body {
            background-color: #2c3e50;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            background-color: white;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;       
            max-width: 440px;  
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #e67e22; 
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 3px solid #e67e22;
            padding-bottom: 10px;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            font-size: 13px;
            font-weight: bold;
            color: #34495e;
            width: 55%;
        }

        .input-group input, .input-group select {
            width: 40%;
            padding: 8px 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 14px;
            text-align: right;
            outline: none;
            box-sizing: border-box;
        }

        #calc-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
            box-shadow: 0 4px 6px rgba(230, 126, 34, 0.3);
        }
        #calc-btn:hover { background-color: #d35400; }

        .result-box {
            display: none; 
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: left;
        }

        .result-title {
            font-weight: bold;
            color: #2c3e50;
            font-size: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #e67e22;
            padding-left: 8px;
        }

        .result-value {
            font-size: 14px;
            margin-bottom: 8px;
            color: #7f8c8d;
        }

        .highlight {
            color: #e74c3c;
            font-weight: bold;
            font-size: 18px;
        }

        #copy-btn {
            background-color: #1da1f2;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .ad-space-box {
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            background-color: #34495e;
            border: 2px dashed #bdc3c7;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            color: #bdc3c7;
            margin-bottom: 20px; /* 保険用の文字とのスキマ */
        }
        .ad-label { font-size: 11px; font-weight: bold; color: #bdc3c7; margin-bottom: 5px; }
        .ad-placeholder-text { font-size: 12px; color: #bdc3c7; line-height: 1.4; }

        /* 【追加：保険用のデザイン】 */
        .disclaimer-box {
            max-width: 440px;
            width: 100%;
            text-align: left;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .disclaimer-text {
            font-size: 11px;
            color: #95a5a6; /* 目立ちすぎないうっすらしたグレー */
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CAD縮尺・寸法一瞬変換ツール</h1>
        
        <div class="input-group">
            <label>① 図面上の計測値 (mm)</label>
            <input type="number" id="drawing-val" value="50" min="0">
        </div>

        <div class="input-group">
            <label>② 現在の図面の縮尺 (1 / ?)</label>
            <select id="current-scale">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="200">200</option>
            </select>
        </div>

        <div class="input-group">
            <label>③ 変換したい目的の縮尺 (1 / ?)</label>
            <select id="target-scale">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="30">30</option>
                <option value="50">50</option>
                <option value="100">100</option>
                <option value="200">200</option>
            </select>
        </div>

        <button id="calc-btn">寸法を一瞬で変換する！</button>

        <div id="result-box" class="result-box">
            <div class="result-title">変換結果</div>
            <div class="result-value">実際のリアルな長さ: <span id="res-real" class="highlight" style="color:#2ecc71;">0</span> mm</div>
            <div class="result-value">変換後の図面上の長さ: <span id="res-converted" class="highlight">0</span> mm</div>
            
            <div style="margin-top: 15px; font-size: 12px; color: #7f8c8d; line-height: 1.4; border-top: 1px solid #bdc3c7; padding-top: 10px;">
                💡 現場での手計算ミスを防止！このまま図面に書き込めます。
            </div>

            <button id="copy-btn">この結果をコピーしてXで現場報告 📋</button>
        </div>
    </div>

    <!-- 広告枠 -->
    <div class="ad-space-box">
        <div class="ad-label">Sponsored</div>
        <div class="ad-placeholder-text">
            ※当サイトは開発費・サーバー維持費のために広告を掲載予定です。<br>
            応援よろしくお願いいたします！
        </div>
    </div>

    <!-- 【追加：ココアさんの身を守るためのお守り文字】 -->
    <div class="disclaimer-box">
        <div class="disclaimer-text">
            【ご利用上の注意】<br>
            本ツールは個人が開発した簡易計算用シミュレーターです。計算結果の正確性には万全を期しておりますが、実際の施工、発注、および実務で使用される際は必ずダブルチェックを行ってください。本ツールの利用によって生じた損害や不利益について、開発者は一切の責任を負いません。
        </div>
    </div>

    <script>
        const calcBtn = document.getElementById("calc-btn");
        const resultBox = document.getElementById("result-box");
        const resReal = document.getElementById("res-real");
        const resConverted = document.getElementById("res-converted");
        const copyBtn = document.getElementById("copy-btn");

        let shareText = "";

        calcBtn.addEventListener("click", () => {
            const drawingVal = parseFloat(document.getElementById("drawing-val").value) || 0;
            const currentScale = parseInt(document.getElementById("current-scale").value) || 1;
            const targetScale = parseInt(document.getElementById("target-scale").value) || 1;

            const realSize = drawingVal * currentScale;
            const convertedSize = realSize / targetScale;

            resultBox.style.display = "block";

            resReal.textContent = realSize.toLocaleString();
            resConverted.textContent = convertedSize.toFixed(1);

            shareText = `CAD縮尺・寸法一瞬変換ツールで計算！1/${currentScale}の図面値${drawingVal}mmを、1/${targetScale}に変換したら【${convertedSize.toFixed(1)}mm】になりました！手計算のミスが無くなって現場で超役立つ！ #CAD変換ツール`;
        });

        copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(shareText).then(() => {
                copyBtn.textContent = "コピー完了！そのままXに貼り付けられます！ ✅";
                copyBtn.style.backgroundColor = "#2ecc71";
                setTimeout(() => {
                    copyBtn.textContent = "この結果をコピーしてXで現場報告 📋";
                    copyBtn.style.backgroundColor = "#1da1f2";
                }, 2000);
            }).catch(err => {
                alert("コピーに失敗しました。");
            });
        });
    </script>
</body>
</html>
