<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAD縮尺・寸法一瞬変換ツール 2.0</title>
  <style>
    /* ココアさん仕様：PCは真ん中寄せ・スマホは100%フィット */
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: #f4f7f6;
      color: #333;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
    }
    h1 {
      font-size: 1.4rem;
      text-align: center;
      color: #0070f3;
      margin-top: 0;
      margin-bottom: 25px;
    }
    h2 {
      font-size: 1.1rem;
      color: #111;
      border-left: 4px solid #0070f3;
      padding-left: 8px;
      margin-top: 30px;
      margin-bottom: 15px;
    }
    label {
      font-weight: bold;
      font-size: 0.85rem;
      display: block;
      margin-top: 12px;
      color: #555;
    }
    input {
      width: 100%;
      padding: 12px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      margin-top: 6px;
      background-color: #fafafa;
    }
    input:focus {
      border-color: #0070f3;
      background-color: #fff;
      outline: none;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 18px;
      transition: background 0.2s;
    }
    button:hover {
      background: #0051b3;
    }
    .result {
      margin-top: 15px;
      padding: 14px;
      background: #fff0f5;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #ff007f;
      text-align: center;
      min-height: 24px;
      border: 1px dashed #ffb6c1;
    }
    
    /* 未来の不労所得用：アドセンス広告枠スペース */
    .ad-space {
      margin-top: 30px;
      padding: 20px 10px;
      background: #fafafa;
      border: 2px dashed #ddd;
      border-radius: 8px;
      text-align: center;
      color: #999;
      font-size: 0.8rem;
    }
    .ad-box {
      width: 100%;
      height: 90px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #eee;
      color: #777;
      font-weight: bold;
      margin-top: 8px;
      border-radius: 4px;
    }

    .disclaimer {
      font-size: 0.75rem;
      color: #666;
      background: #eee;
      padding: 12px;
      border-radius: 6px;
      margin-top: 30px;
      line-height: 1.5;
    }
    .footer-link {
      text-align: center;
      margin-top: 25px;
      font-size: 0.9rem;
    }
    .footer-link a {
      color: #0070f3;
      text-decoration: none;
      font-weight: bold;
    }
    .footer-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🏗️ CAD縮尺・寸法一瞬変換ツール 2.0</h1>

  <!-- 機能1：寸法から実寸を求める -->
  <h2>📏 機能①：寸法から実寸を計算</h2>
  <label>図面の縮尺の分母 (例: 1/141 なら「141」を入力)</label>
  <input type="number" id="scaleInput" placeholder="例: 141" min="1">
  
  <label>図面上で測った寸法 (mm)</label>
  <input type="number" id="drawingSize" placeholder="例: 50" min="0" step="any">
  
  <button id="calcNormalBtn">実寸を計算する</button>
  <div id="normalResult" class="result">ここに結果が表示されます</div>


  <!-- 機能2：縮尺の逆算（新機能） -->
  <h2>📐 機能②：図面の縮尺を逆算</h2>
  <label>① 図面に書かれている本来の寸法 (mm)</label>
  <input type="number" id="realSize" placeholder="例: 3000" min="1">

  <label>② 手元の定規で測った長さ (mm)</label>
  <input type="number" id="measuredSize" placeholder="例: 30" min="0" step="any">

  <button id="calcReverseBtn">縮尺を逆算する</button>
  <div id="reverseResult" class="result">ここに結果が表示されます</div>


  <!-- 【重要】将来の不労所得スペース（ここにAdSenseのコードを流し込む） -->
  <div class="ad-space">
    SPONSORED LINK
    <div class="ad-box">
      <!-- 収益化時はこの文字を消してGoogle AdSenseのインフィードコード等を貼るだけ -->
      広告掲載スペース（準備中）
    </div>
  </div>


  <!-- プロ仕様の免責事項お守り -->
  <div class="disclaimer">
    【免責事項】本ツールは現場の計算補助用です。縮小印刷やコピーの倍率エラーにより、ミリ単位の誤差が発生する場合があります。最終的な発注・施工の際は、必ず設計図書の確定数値をご確認ください。本ツールの利用による損害の責任は負いかねます。
  </div>

  <!-- ココアさんの無敵の公式看板リンク -->
  <div class="footer-link">
    開発者：<a href="https://x.com/cocoa_next7" target="_blank">ココア (@cocoa_next7)</a>
  </div>
</div>

<script>
  // 機能①の処理
  document.getElementById('calcNormalBtn').addEventListener('click', function() {
    const scale = parseFloat(document.getElementById('scaleInput').value);
    const drawing = parseFloat(document.getElementById('drawingSize').value);
    const resultDiv = document.getElementById('normalResult');

    if (!scale || !drawing || scale <= 0 || drawing <= 0) {
      resultDiv.innerText = "⚠️ 正しい数値を入力してください";
      return;
    }

    const realDimensions = scale * drawing;
    resultDiv.innerText = "🎯 実寸: " + realDimensions.toLocaleString() + " mm";
  });

  // 機能②（逆算）の処理
  document.getElementById('calcReverseBtn').addEventListener('click', function() {
    const real = parseFloat(document.getElementById('realSize').value);
    const measured = parseFloat(document.getElementById('measuredSize').value);
    const resultDiv = document.getElementById('reverseResult');

    if (!real || !measured || real <= 0 || measured <= 0) {
      resultDiv.innerText = "⚠️ 両方に正しい数値を入力してください";
      return;
    }

    // 縮尺の分母を計算（四捨五入してきれいな整数にする）
    const scaleDenominator = Math.round(real / measured);

    resultDiv.innerHTML = "🎯 現在の縮尺は 【 1 / " + scaleDenominator + " 】 です！";
  });
</script>

</body>
</html>
